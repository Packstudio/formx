<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>(주)성원건축사사무소</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- LANDING -->
  <section id="landing">
    <div class="landing-inner">
      <p class="landing-kicker">(주)성원건축사사무소</p>

      <h1 class="landing-logo">
        <img src="images/logo-sungwon.svg" alt="성원건축사사무소" />
      </h1>

      <p class="landing-copy">
        건축설계 / 감리 / 시공 / 디자인 / 적산
      </p>

      <div class="landing-actions">
        <button id="enterButton" type="button">Enter</button>
      </div>

      <p class="landing-guide">Scroll Down</p>
    </div>
  </section>

  <!-- MAIN -->
  <main id="main">
    <div class="page-container">

      <header class="site-header">
        <div class="site-brand">
          <p class="brand-kicker">Portfolio Archive</p>
        </div>

        <div class="header-contact-wrap">
          <button id="contactToggle" class="contact-toggle" type="button">
            성원건축사사무소
          </button>

          <div id="contactPanel" class="contact-panel">
            <p><i class="fa-solid fa-envelope"></i> packstudio@naver.com</p>
            <p><i class="fa-solid fa-phone"></i> 010-9674-2033</p>
            <p><i class="fa-solid fa-location-dot"></i> Cheongju-si, Republic of Korea</p>
            <p><i class="fa-brands fa-instagram"></i> @formx.architects</p>
          </div>
        </div>
      </header>

      <section class="hero-section">
        <div class="hero-media">
          <button id="backButton" class="back-button" type="button">
            Back to Projects
          </button>

          <button class="hero-arrow left" id="prevImage" type="button" aria-label="Previous image">
            ‹
          </button>

          <img id="heroImage" src="" alt="project image" />

          <button class="hero-arrow right" id="nextImage" type="button" aria-label="Next image">
            ›
          </button>
        </div>
      </section>

      <section class="project-info-bar">
        <div class="info-main">
          <div class="info-meta">
            <span id="heroType"></span>
            <span class="divider"></span>
            <span id="heroYear"></span>
            <span class="divider"></span>
            <span id="heroLocation"></span>
          </div>

          <h3 id="projectTitle"></h3>
          <p id="projectDesc"></p>
        </div>

        <div class="info-side">
          <div class="image-counter">
            <span id="imageCurrent">1</span>
            <span>/</span>
            <span id="imageTotal">1</span>
          </div>
        </div>
      </section>

      <section class="thumb-section">
        <div class="thumb-header">
          <p id="thumbSectionLabel">Other Projects</p>
          <span id="thumbSectionGuide">Select a project</span>
        </div>

        <div id="thumbnails"></div>
      </section>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
